<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CTRL PRO - Panel Admin</title>
<style>
  * { box-sizing: border-box; font-family: Arial, sans-serif; }
  body { margin:0; background:#0d0d0d; color:#fff; }
  .hidden { display:none !important; }

  /* LOGIN */
  .login-wrap { max-width: 380px; margin: 100px auto; padding: 30px;
    background:#1a1a1a; border-radius:14px; box-shadow:0 4px 14px rgba(0,0,0,.4); }
  .login-wrap h1 { margin:0 0 6px; }
  .login-wrap h3 { margin:0 0 18px; color:#aaa; font-weight:400; }
  input, select, textarea, button {
    width:100%; padding:11px; margin:5px 0 10px;
    border-radius:8px; border:none; font-size:14px;
  }
  input, select, textarea { background:#fff; color:#111; }
  textarea { resize: vertical; min-height: 60px; }
  button { background:#3a4bdd; color:#fff; cursor:pointer; font-weight:500; }
  button:hover { background:#4d5ee5; }
  button.secondary { background:#444; }
  button.danger { background:#d93025; }
  button.warning { background:#f0b429; color:#111; }
  button.success { background:#16a765; }
  button.btn-sm { padding:6px 12px; font-size:12px; width:auto; margin:2px; }
  .msg { color:#f88; font-size:13px; margin-top:6px; min-height:18px; }
  .msg.ok { color:#7c7; }

  /* APP */
  .app { display:flex; min-height:100vh; }
  aside { width:220px; background:#1a1a1a; padding:20px 0; flex-shrink:0; }
  aside .brand { padding:0 20px 20px; border-bottom:1px solid #2a2a2a; }
  aside .brand h2 { margin:0; font-size:18px; }
  aside .brand .who { font-size:12px; color:#888; margin-top:4px; }
  aside nav { padding:14px 0; }
  aside nav button {
    display:block; width:100%; text-align:left;
    background:transparent; padding:11px 20px; border-radius:0;
    border-left:3px solid transparent; color:#bbb; margin:0; font-size:14px;
  }
  aside nav button:hover { background:#222; color:#fff; }
  aside nav button.active { border-left-color:#3a4bdd; color:#fff; background:#222; }
  aside .logout-btn { margin: 20px; padding: 9px 12px; }

  main { flex:1; padding:24px 32px; overflow-x:auto; }
  .section { display:none; }
  .section.active { display:block; }

  h2.section-title { margin:0 0 18px; font-size:22px; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .row > * { margin:0; }
  .filter-bar { background:#1a1a1a; padding:14px; border-radius:10px; margin-bottom:18px; }
  .filter-bar .row { gap:10px; }
  .filter-bar input, .filter-bar select { width:auto; min-width:140px; max-width:240px; }

  .grid { display:grid; gap:14px; }
  .grid.cols-2 { grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); }
  .grid.cols-3 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }

  .card { background:#1a1a1a; padding:16px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.3); }
  .card h3 { margin:0 0 12px; font-size:16px; }
  .pc-card { padding:16px; border-radius:12px; background:#1a1a1a; cursor:pointer;
    border-left:4px solid #3a4bdd; transition: transform .1s; }
  .pc-card:hover { transform: translateY(-2px); }
  .pc-card .pc-name { font-size:18px; font-weight:bold; }
  .pc-card .pc-status { color:#7c7; font-size:13px; margin-top:4px; }
  .pc-card .pc-status.empty { color:#f88; }
  .pc-card .pc-stats { display:flex; gap:14px; margin-top:10px; font-size:12px; }
  .pc-card .pc-stat { background:#2a2a2a; padding:5px 9px; border-radius:6px; }
  .pc-card .pc-stat.alert { background:#3d2020; color:#f88; }
  .pc-card .pc-pausa { font-size:12px; color:#fab; margin-top:4px; }

  table { width:100%; border-collapse:collapse; background:#1a1a1a; border-radius:8px; overflow:hidden; }
  th, td { padding:10px 12px; text-align:left; border-bottom:1px solid #2a2a2a; font-size:13px; }
  th { background:#222; color:#bbb; font-weight:500; font-size:12px; text-transform:uppercase; }
  tr:last-child td { border-bottom:none; }
  tr.inactive td { color:#666; font-style:italic; }
  td.actions { white-space:nowrap; text-align:right; }
  td input, td select { padding:6px 8px; font-size:13px; margin:0; }

  .badge { display:inline-block; padding:3px 8px; border-radius:99px; font-size:11px; font-weight:bold; }
  .badge.green { background:#173321; color:#7c7; }
  .badge.red { background:#3d2020; color:#f88; }
  .badge.yellow { background:#3d3220; color:#f0b429; }
  .badge.blue { background:#1d2540; color:#88a8f0; }
  .badge.gray { background:#2a2a2a; color:#aaa; }

  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; z-index:100; }
  .modal { background:#1f1f1f; padding:24px; border-radius:12px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; }
  .modal h3 { margin:0 0 14px; }
  .modal .row-buttons { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }
  .modal .row-buttons button { width:auto; padding:8px 16px; }

  label { display:block; font-size:12px; color:#aaa; margin:8px 0 2px; }

  .empty-state { padding:30px; text-align:center; color:#888; background:#1a1a1a; border-radius:10px; }
  .stat { display:inline-block; margin-right:14px; }
  .stat .stat-num { font-size:24px; font-weight:bold; }
  .stat .stat-label { font-size:11px; color:#aaa; text-transform:uppercase; }

  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:12px; margin-bottom:18px; }
  .stat-card { background:#1f2937; padding:14px 16px; border-radius:10px; border-left:4px solid #1a73e8; }
  .stat-card.green { border-left-color:#3eb368; }
  .stat-card.yellow { border-left-color:#f0b429; }
  .stat-card.red { border-left-color:#d93025; }
  .stat-card.gray { border-left-color:#6b7280; }
  .stat-card .num { font-size:26px; font-weight:bold; color:#fff; }
  .stat-card .lbl { font-size:11px; color:#bbb; text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
  .stat-card .sub { font-size:11px; color:#888; margin-top:4px; }

  .bar-chart { background:#1a1a1a; padding:14px; border-radius:10px; margin-bottom:18px; }
  .bar-chart h4 { margin:0 0 10px; font-size:13px; color:#bbb; text-transform:uppercase; letter-spacing:0.5px; }
  .bar-row { display:flex; align-items:center; margin-bottom:6px; gap:10px; }
  .bar-row .lbl { width:140px; font-size:13px; color:#ddd; }

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyRaRvPoOZRStLWkfI-RECpYZ_6D72QTaqf_iAsZOdfmYWrwW-5fXlYDzJ5AkpUfjMr/exec";

let admin = null;
let _operadoresCache = [];
let _telefonosCache = [];
let _pcsCache = [];

const escape = s => String(s == null ? "" : s).replace(/[&<>"']/g, c => (
  {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
));

// Formatea fechas de Sheets. Detecta el artefacto 1899 (tiempo sin fecha) y lo muestra solo como hora.
function fmt(val) {
  if (val == null || val === "") return "";
  // Si es un número devuelto por JSON (timestamp en ms), convertir
  const d = (typeof val === "number") ? new Date(val) : new Date(val);
  if (isNaN(d.getTime())) return String(val);
  // Artefacto de Google Sheets: fecha 1899-12-30 significa que la celda es solo hora
  if (d.getFullYear() === 1899 || d.getFullYear() === 1900) {
    return d.toLocaleTimeString("es-AR", { timeZone: "America/Argentina/Buenos_Aires", hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }
  return d.toLocaleDateString("es-AR", { timeZone: "America/Argentina/Buenos_Aires", day: "2-digit", month: "2-digit", year: "numeric" })
    + " " + d.toLocaleTimeString("es-AR", { timeZone: "America/Argentina/Buenos_Aires", hour: "2-digit", minute: "2-digit" });
}
function fmtFecha(val) {
  if (!val) return "";
  const d = new Date(val);
  if (isNaN(d.getTime())) return String(val);
  if (d.getFullYear() === 1899) return "";
  return d.toLocaleDateString("es-AR", { timeZone: "America/Argentina/Buenos_Aires", day: "2-digit", month: "2-digit", year: "numeric" });
}
function fmtHora(val) {
  if (!val) return "";
  const d = new Date(val);
  if (isNaN(d.getTime())) return String(val);
  return d.toLocaleTimeString("es-AR", { timeZone: "America/Argentina/Buenos_Aires", hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

async function api(params) {
  const url = API_URL + "?" + new URLSearchParams({ ...params, nombre: params.nombre || (admin ? admin.nombre : ""), _t: Date.now() }).toString();
  try {
    const r = await fetch(url, { method: "GET" });
    return await r.json();
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

async function apiPost(params) {
  try {
    const body = { ...params, nombre: params.nombre || (admin ? admin.nombre : "") };
    const res = await fetch(API_URL + "?_t=" + Date.now(), {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(body),
      cache: "no-store"
    });
    return await res.json();
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

function _comprimirImagen(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1600;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          const ratio = Math.min(MAX / w, MAX / h);
          w = Math.round(w * ratio); h = Math.round(h * ratio);
        }
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", 0.72));
      };
      img.onerror = () => reject(new Error("No se pudo cargar la imagen"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("No se pudo leer el archivo"));
    reader.readAsDataURL(file);
  });
}

function _attachPasteHandler(textareaId, previewId) {
  const ta = document.getElementById(textareaId);
  if (!ta || ta._pasteAttached) return;
  ta._pasteAttached = true;
  ta.addEventListener("paste", async (e) => {
    const items = (e.clipboardData && e.clipboardData.items) || [];
    for (let i = 0; i < items.length; i++) {
      if (items[i].type && items[i].type.indexOf("image/") === 0) {
        e.preventDefault();
        const file = items[i].getAsFile();
        if (!file) return;
        const preview = document.getElementById(previewId);
        if (preview) preview.innerHTML = '<span style="color:#888;font-size:12px">Comprimiendo...</span>';
        try {
          const dataUrl = await _comprimirImagen(file);
          ta._imagenPendiente = dataUrl;
          if (preview) preview.innerHTML = `
            <div style="margin-top:6px">
              <img src="${dataUrl}" style="max-width:240px;max-height:160px;border-radius:6px;border:1px solid #444;display:block">
              <button class="btn-sm warning" style="margin-top:4px" onclick="_cancelarImagen('${textareaId}', '${previewId}')">Quitar</button>
            </div>`;
        } catch (err) {
          if (preview) preview.innerHTML = '<span style="color:#d93025">Error: ' + err.message + '</span>';
        }
        break;
      }
    }
  });
}

function _cancelarImagen(textareaId, previewId) {
  const ta = document.getElementById(textareaId);
  if (ta) ta._imagenPendiente = null;

function setMsg(id, msg, ok) {

// =========== HELPERS DE METRICAS ===========

function _statsHtml(cards) {
  return `<div class="stats-grid">${cards.map(c => `
    <div class="stat-card ${c.color || ''}">
      <div class="num">${c.num}</div>
      <div class="lbl">${escape(c.label)}</div>
      ${c.sub ? `<div class="sub">${escape(c.sub)}</div>` : ""}
    </div>
  `).join("")}</div>`;
}

function _barChartHtml(titulo, items, colorMap) {
  if (!items.length) return "";
  const max = Math.max(...items.map(i => i.value), 1);
  return `
    <div class="bar-chart">
      <h4>${escape(titulo)}</h4>
      ${items.map(i => `
        <div class="bar-row">
          <div class="lbl">${escape(i.label)}</div>
          <div class="bar-wrap"><div class="bar ${colorMap && colorMap[i.label] || ''}" style="width:${(i.value/max*100).toFixed(1)}%"></div></div>
          <div class="val">${i.value}${i.suffix||''}</div>
        </div>
      `).join("")}
    </div>`;
}

function _agruparContar(arr, keyFn) {
  const m = {};
  arr.forEach(x => {
    const k = keyFn(x) || "(s/d)";
    m[k] = (m[k] || 0) + 1;
  });
  return Object.keys(m).map(k => ({ label: k, value: m[k] })).sort((a,b) => b.value - a.value);
}

function _promedio(arr) {
  if (!arr.length) return 0;
  return Math.round(arr.reduce((s,x) => s+x, 0) / arr.length * 10) / 10;
}

async function cargarPCsCache() {
  const r = await api({ action: "getpcsadmin" });
  if (!r.ok) return;
  _pcsCache = r.pcs || [];
  ["filterOpPC","filterTelPC","filterTareaPC","filterNovPC","filterHistPC",
   "filterRecPC","filterPausaPC","filterNotaPC","filterLogTelPC"].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = '<option value="">' + sel.options[0].text + '</option>';
    _pcsCache.forEach(p => {

}

async function cargarOperadores() {
  const [r, top] = await Promise.all([
    api({ action: "getoperadoresadmin" }),
    api({ action: "gettoppausas" })
  ]);
  if (!r.ok) return;
  _operadoresCache = r.operadores || [];
  _topPausasCache = top.ok ? top : null;
  renderOperadores();
}

let _topPausasCache = null;

function renderOperadores() {
  const box = document.getElementById("operadoresBox");
  const fNombre = (document.getElementById("filterOpNombre").value || "").toLowerCase();
  const fActivo = document.getElementById("filterOpActivo").value;
  const fPC = document.getElementById("filterOpPC").value;

  const ops = _operadoresCache.filter(o => {
    if (fNombre && !String(o.Nombre || "").toLowerCase().includes(fNombre)) return false;
    const act = String(o.Activo || "").toLowerCase();
    if (fActivo === "si" && act !== "sí" && act !== "si") return false;
    if (fActivo === "no" && (act === "sí" || act === "si")) return false;
    if (fPC && o.PC !== fPC) return false;
    return true;
  });

  // === METRICAS ===
  const total = _operadoresCache.length;
  const activos = _operadoresCache.filter(o => { const a=String(o.Activo||"").toLowerCase(); return a==="sí"||a==="si"; }).length;
  const inactivos = total - activos;
  const franqueros = _operadoresCache.filter(o => String(o.Tipo||"").toLowerCase().indexOf("franq") !== -1).length;
  const admins = _operadoresCache.filter(o => String(o.Tipo||"").toLowerCase().indexOf("admin") !== -1).length;

  const statsHtml = _statsHtml([
    { num: total, label: "Total", color: "gray" },
    { num: activos, label: "Activos", color: "green" },
    { num: inactivos, label: "Inactivos", color: "red" },
    { num: franqueros, label: "Franqueros", color: "yellow" },
    { num: admins, label: "Admins", color: "" }
  ]);

  const porTurno = _agruparContar(_operadoresCache, o => o.Turno);
  const porTipo = _agruparContar(_operadoresCache, o => o.Tipo);
  const charts = `
    <div class="grid cols-2">
      ${_barChartHtml("Por turno", porTurno)}
      ${_barChartHtml("Por tipo", porTipo)}
    </div>`;

  // Top 5 pausas
  let topHtml = "";
  if (_topPausasCache) {
    const t = _topPausasCache;
    const col = (list, titulo, campo) => {
      if (!list.length) return "";
      return `<div>
        <h4 style="font-size:12px;color:#bbb;text-transform:uppercase;margin:0 0 8px">${titulo}</h4>
        ${list.map((o,i) => `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="color:#666;width:16px">${i+1}</span>
            <span style="flex:1;font-size:13px">${escape(o.operador)}</span>
            <span class="badge gray" style="font-size:11px">${o[campo]} min</span>
          </div>`).join("")}
      </div>`;
    };
    topHtml = `
      <div class="bar-chart" style="margin-bottom:18px">
        <h4>🏆 Top 5 por tiempo de pausa</h4>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px">
          ${col(t.topBano, "🚽 Baño", "bano")}
          ${col(t.topFumar, "🚬 Fumar", "fumar")}
          ${col(t.topLimpieza, "🧹 Limpieza", "limpieza")}
        </div>
      </div>`;
  }

  if (!ops.length) {
    box.innerHTML = statsHtml + charts + topHtml + '<div class="empty-state">Sin resultados.</div>';
    return;
  }

  box.innerHTML = statsHtml + charts + topHtml + `
    <table>
      <thead><tr>
        <th>Nombre</th><th>PIN</th><th>Turno</th><th>PC</th><th>Tipo</th><th>Activo</th><th></th>
      </tr></thead>
      <tbody>${ops.map(o => {
        const act = (String(o.Activo).toLowerCase() === "sí" || String(o.Activo).toLowerCase() === "si");
        return `
        <tr class="${act ? "" : "inactive"}">
          <td><b>${escape(o.Nombre)}</b></td>
          <td>••••</td>
          <td>${escape(o.Turno || "")}</td>
          <td>${escape(o.PC || "")}</td>
          <td>${escape(o.Tipo || "")}</td>
          <td><span class="badge ${act?'green':'red'}">${act?'Sí':'No'}</span></td>
          <td class="actions">
            <button class="btn-sm secondary" onclick="modalEditarOperador('${escape(o.Nombre)}')">Editar</button>
            <button class="btn-sm warning" onclick="modalResetPin('${escape(o.Nombre)}')">PIN</button>
            <button class="btn-sm ${act?'secondary':'success'}" onclick="toggleActivoOperador('${escape(o.Nombre)}', ${!act})">${act?'Desactivar':'Activar'}</button>
            <button class="btn-sm danger" onclick="eliminarOperador('${escape(o.Nombre)}')">×</button>
          </td>
        </tr>`;
      }).join("")}</tbody>
    </table>`;
}

let _tareasCache = [];

async function cargarTareas() {
  const r = await api({ action: "gettareasadmin" });
  if (!r.ok) return;
  _tareasCache = r.tareas || [];
  renderTareas();
}

function renderTareas() {
  const box = document.getElementById("tareasBox");
  const fPC = document.getElementById("filterTareaPC").value;
  const fEst = document.getElementById("filterTareaEstado").value;

  const tareas = _tareasCache.filter(t => {
    if (fPC && t.pc !== fPC) return false;
    const est = String(t.estado || "").toLowerCase();
    if (fEst === "completada" && est !== "completada") return false;
    if (fEst === "pendiente" && est === "completada") return false;
    return true;
  });

  // === METRICAS ===
  const total = _tareasCache.length;
  const compl = _tareasCache.filter(t => String(t.estado||"").toLowerCase() === "completada").length;
  const pend = total - compl;
  const tasaCompletado = total ? Math.round(compl/total*100) : 0;

  const statsHtml = _statsHtml([
    { num: total, label: "Total", color: "gray" },
    { num: pend, label: "Pendientes", color: pend>0?"yellow":"green" },
    { num: compl, label: "Completadas", color: "green" },
    { num: tasaCompletado + "%", label: "Tasa completado", color: tasaCompletado>=70?"green":(tasaCompletado>=40?"yellow":"red") }
  ]);

  const porPC = _agruparContar(_tareasCache, t => t.pc);
  const charts = _barChartHtml("Tareas por PC", porPC);

  if (!tareas.length) { box.innerHTML = statsHtml + charts + '<div class="empty-state">Sin tareas en el filtro.</div>'; return; }

  box.innerHTML = statsHtml + charts + `
    <table>
      <thead><tr><th>PC</th><th>Tarea</th><th>Asignada</th><th>Estado</th><th>Completada</th><th>Por</th><th></th></tr></thead>
      <tbody>${tareas.map(t => {
        const completa = String(t.estado || "").toLowerCase() === "completada";
        return `<tr class="${completa?'inactive':''}">
          <td><b>${escape(t.pc)}</b></td>
          <td>${escape(t.tarea)}</td>
          <td>${escape(fmt(t.timestamp) || t.fecha || "")}</td>
          <td><span class="badge ${completa?'green':'yellow'}">${escape(t.estado || 'Pendiente')}</span></td>
          <td>${t.fechaCompletada ? escape(fmt(t.fechaCompletada)) : ""}</td>
          <td>${escape(t.completoPor || "")}</td>
          <td class="actions">
            <button class="btn-sm secondary" onclick="modalEditarTarea(${t.fila})">Editar</button>
            <button class="btn-sm danger" onclick="eliminarTarea(${t.fila})">×</button>
          </td>
        </tr>`;
      }).join("")}</tbody>
    </table>`;
}

  const porPC = _agruparContar(all, p => p.pc);

  if (!all.length) { box.innerHTML = statsHtml + '<div class="empty-state">Sin pausas registradas.</div>'; return; }

  _pausasCache = all;

  box.innerHTML = statsHtml + charts + `
    <table><thead><tr>
      <th>Fecha</th><th>Tipo</th><th>Operador</th><th>PC</th>
      <th>Salida</th><th>Regreso</th><th>Min</th><th>Excedió</th><th>Estado</th><th></th>
    </tr></thead>
    <tbody>${r.pausas.map((p,i) => {
      const excedio = String(p.excedio || '').toLowerCase();
      const excedioSi = excedio === 'sí' || excedio === 'si';
      return `<tr>
        <td>${escape(fmtFecha(p.timestamp) || p.fecha)}</td>

// =========== LOG TELÉFONOS GLOBAL ===========

async function cargarLogTel() {
  const box = document.getElementById("logTelBox");
  box.innerHTML = '<div class="empty-state">Cargando...</div>';
  const pc = document.getElementById("filterLogTelPC").value;
  const linea = document.getElementById("filterLogTelLinea").value.trim();
  const desde = document.getElementById("filterLogTelDesde").value;
  const hasta = document.getElementById("filterLogTelHasta").value;
  const r = await api({ action: "getlogtelefonosadmin", pc, linea, desde, hasta });
  if (!r.ok) { box.innerHTML = '<div class="empty-state">Error.</div>'; return; }

  const all = r.log || [];
  const abiertas = all.filter(e => e.estado === "Abierta").length;
  const cerradas = all.length - abiertas;
  const minsCerr = all.filter(e => e.estado !== "Abierta" && Number(e.duracion)).map(e => Number(e.duracion));
  const promedio = _promedio(minsCerr);

  const statsHtml = _statsHtml([
    { num: all.length, label: "Total caídas", color: "gray" },
    { num: abiertas, label: "Abiertas ahora", color: abiertas>0?"red":"green" },
    { num: cerradas, label: "Cerradas", color: "" },
    { num: promedio + " min", label: "Duración promedio", color: promedio>30?"red":(promedio>10?"yellow":"green") }
  ]);

  const porLinea = _agruparContar(all, e => e.linea);
  const porPC = _agruparContar(all, e => e.pc);
  const charts = `
    <div class="grid cols-2">
      ${_barChartHtml("Por línea", porLinea)}
      ${_barChartHtml("Por PC", porPC)}
    </div>`;

  if (!all.length) { box.innerHTML = statsHtml + '<div class="empty-state">Sin caídas registradas.</div>'; return; }

  _logTelCache = all;
  box.innerHTML = statsHtml + charts + `
    <table>
      <thead><tr>
        <th>Fecha</th><th>PC</th><th>Línea</th>
        <th>Caída</th><th>Operador</th><th>Motivo</th>
        <th>Levantado</th><th>Duración</th><th>Por</th><th>Estado</th><th></th>
      </tr></thead>
      <tbody>${all.map((e,i) => `
        <tr>
          <td>${escape(fmtFecha(e.timestamp))}</td>
          <td><b>${escape(e.pc)}</b></td>
          <td>${escape(e.linea)}</td>
          <td>${escape(fmtHora(e.horaCaida))}</td>
          <td>${escape(e.operadorCaida)}</td>
          <td>${escape(e.motivo || '')}</td>
          <td>${escape(fmtHora(e.horaLevantado))}</td>
          <td>${e.duracion ? e.duracion + ' min' : ''}</td>
          <td>${escape(e.operadorLevanta || '')}</td>
          <td><span class="badge ${e.estado==='Cerrada'?'green':'red'}">${escape(e.estado)}</span></td>
          <td class="actions">
            <button class="btn-sm secondary" onclick="modalEditarLogTel(${i})">Editar</button>
            <button class="btn-sm danger" onclick="eliminarLogTel(${e.fila})">×</button>
          </td>
        </tr>`).join("")}</tbody>
    </table>`;
}

  abrirModal({ titulo: "Editar caída tel. fila " + e.fila, campos: [

// =========== COMENTARIOS NOVEDADES ===========

async function abrirThreadComentarios(id) {
  abrirModal({
    titulo: "💬 Comentarios — " + id,
    html: `
      <div id="threadLista">Cargando...</div>
      <div style="margin-top:12px;border-top:1px solid #444;padding-top:12px">
        <textarea id="threadInput" placeholder="Escribir comentario... (Ctrl+V para pegar imagen)" rows="2"></textarea>
        <div id="threadPreview"></div>
        <button class="success" style="margin-top:6px" onclick="_threadAgregar('${escape(id)}')">Agregar comentario</button>
      </div>
    `,
    soloLectura: true
  });
  _attachPasteHandler("threadInput", "threadPreview");
  await _threadRender(id);
}

async function _threadRender(id) {
  const lista = document.getElementById("threadLista");
  if (!lista) return;
  const r = await api({ action: "getcomentariosnovedad", id });
  if (!r.ok) { lista.innerHTML = `<div class="empty-state">Error: ${escape(r.error)}</div>`; return; }
  if (!r.comentarios.length) {
    lista.innerHTML = `<div class="empty-state">Sin comentarios.</div>`;
    return;
  }
  const yo = (admin && admin.nombre || "").toLowerCase();
  lista.innerHTML = r.comentarios.map(c => {
    const esMio = String(c.autor || "").toLowerCase() === yo;
    const editado = c.editado ? ` <span style="color:#888;font-size:11px">(editado)</span>` : "";
    const imagen = c.imagenURL ? `
      <a href="${escape(c.imagenURL)}" target="_blank" rel="noopener">
        <img src="${escape(c.imagenURL)}" style="max-width:300px;max-height:220px;margin-top:6px;border-radius:6px;border:1px solid #444;display:block">
      </a>` : "";
    return `
      <div style="background:#222;padding:10px 14px;border-radius:6px;margin-bottom:8px;border-left:3px solid ${esMio ? "#1a73e8" : "#444"}">
        <div style="font-size:12px;color:#bbb"><b>${escape(c.autor)}</b> · ${escape(fmt(c.timestamp))}${editado}</div>
        <div style="margin-top:4px;white-space:pre-wrap">${escape(c.texto)}</div>
        ${imagen}
        <div style="margin-top:6px;display:flex;gap:6px">
          <button class="btn-sm" onclick="_threadEditar(${c.fila}, '${escape(id)}')">Editar</button>
          <button class="btn-sm danger" onclick="_threadEliminar(${c.fila}, '${escape(id)}')">Eliminar</button>
        </div>
      </div>
    `;
  }).join("");
}

async function _threadAgregar(id) {
  const ta = document.getElementById("threadInput");
  if (!ta) return;
  const texto = ta.value.trim();
  const imagen = ta._imagenPendiente || "";
  if (!texto && !imagen) return;
  const params = { action: "agregarcomentario", id, nota: texto };
  if (imagen) params.imagenBase64 = imagen;
  const r = imagen ? await apiPost(params) : await api(params);
  if (!r.ok) return alert(r.error);
  ta.value = "";
  ta._imagenPendiente = null;
  const preview = document.getElementById("threadPreview");
  if (preview) preview.innerHTML = "";
  await _threadRender(id);
}

async function _threadEditar(fila, id) {
  const div = document.querySelector(`#threadLista [data-fila="${fila}"]`);
  // texto original — pedimos por prompt
  const nuevo = prompt("Editar comentario:");
  if (nuevo === null) return;
  const texto = nuevo.trim();
  if (!texto) return;
  const r = await api({ action: "editarcomentario", fila, nota: texto });
  if (!r.ok) return alert(r.error);
  await _threadRender(id);
}

async function _threadEliminar(fila, id) {
  if (!confirm("¿Eliminar comentario?")) return;
  const r = await api({ action: "eliminarcomentario", fila });
  if (!r.ok) return alert(r.error);
  await _threadRender(id);
}

// =========== MODAL ===========

function abrirModal({ titulo, campos, onSave, html, soloLectura }) {
  const root = document.getElementById("modalRoot");
  let cuerpo = "";
  if (html) cuerpo = html;
  else if (campos) {
    cuerpo = campos.map(c => {
      if (c.type === "textarea") {
        return `<label>${escape(c.label)}</label><textarea id="modal-${c.id}" placeholder="${escape(c.placeholder||'')}">${escape(c.value||'')}</textarea>`;
      }
      if (c.type === "select") {
        return `<label>${escape(c.label)}</label><select id="modal-${c.id}">${
          c.opciones.map(o => `<option value="${escape(o)}" ${o===c.value?'selected':''}>${escape(o)}</option>`).join("")
        }</select>`;
      }
      return `<label>${escape(c.label)}</label><input id="modal-${c.id}" type="${c.type||'text'}" placeholder="${escape(c.placeholder||'')}" value="${escape(c.value||'')}" />`;
    }).join("");
  }

  root.innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)cerrarModal()">
      <div class="modal">
        <h3>${escape(titulo)}</h3>
        ${cuerpo}
        <div class="row-buttons">
          ${soloLectura ? '' : '<button class="success" onclick="_modalSave()">Guardar</button>'}
          <button class="secondary" onclick="cerrarModal()">${soloLectura?'Cerrar':'Cancelar'}</button>
        </div>
      </div>
    </div>`;

  window._modalSave = async () => {
    if (!campos) return cerrarModal();
    const vals = {};
    campos.forEach(c => {
      const el = document.getElementById("modal-" + c.id);
      if (el) vals[c.id] = el.value;
    });
    if (onSave) await onSave(vals);
  };
}

function cerrarModal() {
  document.getElementById("modalRoot").innerHTML = "";
  window._modalSave = null;
}

// =========== CHAT ADMIN ===========

let _chatAdminUltimoTs = null;
let _chatAdminInterval = null;

async function chatAdminIniciar() {
  if (_chatAdminInterval) return; // ya corriendo
  await chatAdminCargar(false);
  _chatAdminInterval = setInterval(() => chatAdminCargar(true), 8000);
  const input = document.getElementById("chatAdminInput");
  if (input) input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); chatAdminEnviar(); }
  });
}

async function chatAdminCargar(silencioso) {
  const box = document.getElementById("chatAdminMensajes");
  if (!box) return;
  const params = { action: "getmensajes", limit: 60 };
  if (_chatAdminUltimoTs) params.desdeTs = _chatAdminUltimoTs;
  const r = await api(params);
  if (!r.ok || !r.mensajes) return;
  if (!r.mensajes.length && !silencioso) {
    box.innerHTML = '<div style="color:#666;text-align:center;padding:30px 0">Sin mensajes todavía.</div>';
    return;
  }
  const yo = (admin && admin.nombre || "").toLowerCase();
  r.mensajes.forEach(m => {
    const ts = new Date(m.timestamp);
    const tsStr = ts.toLocaleTimeString("es-AR", { timeZone: "America/Argentina/Buenos_Aires", hour: "2-digit", minute: "2-digit" });
    const esMio = String(m.operador || "").toLowerCase() === yo;
    const div = document.createElement("div");
    div.className = "chat-admin-msg " + (esMio ? "mio" : "otro");
    div.innerHTML = `
      <div class="meta">${esMio ? "Vos (admin)" : (escape(m.operador) + (m.pc ? " · " + escape(m.pc) : ""))} · ${tsStr}</div>
      <div style="color:#ddd;font-size:13px">${escape(m.texto)}</div>`;
    box.appendChild(div);
    _chatAdminUltimoTs = m.timestamp;
  });
  if (r.mensajes.length) box.scrollTop = box.scrollHeight;
}

async function chatAdminEnviar() {
  const input = document.getElementById("chatAdminInput");
  const texto = input ? input.value.trim() : "";
  if (!texto || !admin) return;
  input.value = "";
  input.disabled = true;
  const r = await api({ action: "enviarmensaje", nombre: admin.nombre, pc: "Admin", turno: "", nota: texto });
  input.disabled = false;
  if (r.ok) chatAdminCargar(true);
  else input.value = texto;
}

})();
