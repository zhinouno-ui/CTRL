
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTRL PRO - Panel Operativo</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #111;
      color: #fff;
    }

    .container {
      max-width: 1150px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1f1f1f;
      padding: 20px;
      margin-bottom: 18px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,.25);
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    input, select, textarea, button {
      width: 100%;
      padding: 12px;
      margin: 6px 0 12px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
    }

    input, select, textarea {
      background: #fff;
      color: #111;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    button {
      cursor: pointer;
      font-weight: bold;
      background: #f1f1f1;
      color: #111;
    }

    .danger {
      background: #d93025;
      color: white;
    }

    .success {
      background: #16a765;
      color: white;
    }

    .warning {
      background: #fbbc04;
      color: #111;
    }

    .secondary {
      background: #666;
      color: white;
    }

    .primary {
      background: #4b5cff;
      color: white;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .row button {
      flex: 1;
      min-width: 160px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .hidden {
      display: none;
    }

    .badge {
      display: inline-block;
      background: #333;
      padding: 8px 12px;
      border-radius: 999px;
      margin: 4px 5px 4px 0;
    }

    .telef-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin: 4px 6px 4px 0;
      vertical-align: top;
    }

    .telef-item .badge {
      margin: 0;
      transition: background .2s, opacity .2s;
    }

    .telef-item.caido .badge {
      background: #4a1a1a;
      color: #f88;
      text-decoration: line-through;
      opacity: .75;
    }

    .telef-item .btn-icon {
      background: none;
      border: none;
      padding: 2px 4px;
      margin: 0;
      width: auto;
      font-size: 13px;
      cursor: pointer;
      opacity: .5;
      border-radius: 6px;
      transition: opacity .15s;
    }

    .telef-item .btn-icon:hover { opacity: 1; background: #333; }

    .telef-nota {
      display: block;
      font-size: 11px;
      color: #f0b429;
      margin-top: 2px;
      max-width: 180px;
      word-break: break-word;
    }

    .telef-nota-input {
      font-size: 12px;
      padding: 4px 8px;
      margin: 2px 0 0;
      width: 160px;
      border-radius: 6px;
    }

    .telef-log-panel {
      display: block;
      background: #2a2a2a;
      border-radius: 8px;
      padding: 8px 10px;
      margin-top: 4px;
      width: 300px;
      font-size: 12px;
    }

    .telef-log-entry {
      border-bottom: 1px solid #3a3a3a;
      padding: 4px 0;
      line-height: 1.5;
    }

    .telef-log-entry:last-child { border-bottom: none; }

    .novedad-nota-input {
      width: 100%;
      font-size: 13px;
      padding: 6px 10px;
      margin: 6px 0 0;
      border-radius: 8px;
      background: #fff;
      color: #111;
      border: none;
    }

    .msg {
      color: #ddd;
      font-size: 14px;
      margin-top: 6px;
      white-space: pre-wrap;
    }

    .alert {
      background: #392222;
      border-left: 5px solid #d93025;
      padding: 14px;
      border-radius: 10px;
      margin: 10px 0;
    }

    .alert.ok {
      background: #173321;
      border-left-color: #16a765;
    }

    .novedad {
      background: #2c2c2c;
      border-left: 5px solid #fbbc04;
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .small {
      color: #bbb;
      font-size: 13px;
    }

    /* FLOATING WIDGET */
    #floatWidget {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      user-select: none;
    }

    #floatWidget .fw-gear {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #4b5cff;
      border: none;
      font-size: 22px;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
      transition: background .2s;
    }

    #floatWidget .fw-gear:active {
      cursor: grabbing;
    }

    #floatWidget .fw-gear:hover {
      background: #3a4bdd;
    }

    #floatWidget .fw-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    #floatWidget .fw-actions.hidden {
      display: none;
    }

    .fw-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,.4);
      position: relative;
      transition: transform .15s, background .2s;
    }

    .fw-btn:hover {
      transform: scale(1.1);
    }

    .fw-btn .fw-tooltip {
      position: absolute;
      right: 58px;
      background: #222;
      color: #fff;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
    }

    .fw-btn:hover .fw-tooltip {
      opacity: 1;
    }

    .fw-btn-bano     { background: #1a73e8; }
    .fw-btn-fumar    { background: #5f6368; }
    .fw-btn-limpieza { background: #ad7c00; }
  </style>
</head>

<body>
<div class="container">

  <!-- LOGIN -->
  <div class="card" id="loginCard">
    <h1>CTRL PRO</h1>
    <h3>Ingreso al panel operativo</h3>

    <label>Operador</label>
    <input id="loginNombre" placeholder="Ej: Nombre" />

    <label>PIN</label>
    <input id="loginPin" type="password" placeholder="PIN" />

    <div id="pcSelectorWrap" class="hidden">
      <label id="pcSelectorLabel">PC en la que te sentás</label>
      <select id="pcSelector"></select>
    </div>

    <button class="primary" onclick="login()">Ingresar</button>
    <div id="loginMsg" class="msg"></div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">

    <!-- TURNO ACTIVO -->
    <div class="card">
      <h2>Turno activo</h2>
      <div id="operadorInfo"></div>
      <button class="secondary" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>

    <!-- CAMBIO DE PIN -->
    <div class="card hidden" id="cambiarPinCard">
      <h3>Cambiar PIN</h3>

      <label>PIN actual</label>
      <input id="pinActual" type="password" placeholder="PIN actual" />

      <label>PIN nuevo</label>
      <input id="pinNuevo" type="password" placeholder="PIN nuevo" />

      <label>Confirmar PIN nuevo</label>
      <input id="pinNuevoConfirm" type="password" placeholder="Repetir PIN nuevo" />

      <div class="row">
        <button class="primary" onclick="cambiarPin()">Guardar</button>
        <button class="secondary" onclick="ocultarCambioPin()">Cancelar</button>
      </div>

      <div id="cambiarPinMsg" class="msg"></div>
    </div>

    <!-- AVISO LIMPIEZA -->
    <div class="card hidden" id="limpiezaAvisoCard">
      <h3>🧹 Cronograma de limpieza</h3>
      <div id="limpiezaAvisoBox"></div>
    </div>

    <!-- ACCIONES -->
    <div class="card">
      <h3>Acciones rápidas</h3>

      <div class="row">
        <button id="banoBtn"     class="warning" onclick="banoToggle()">🚽 Voy al baño</button>
        <button id="fumarBtn"    class="warning" onclick="fumarToggle()">🚬 Voy a fumar</button>
        <button id="limpiezaBtn" class="warning" onclick="limpiezaToggle()">🧹 Iniciar limpieza</button>
      </div>

      <div id="accionMsg" class="msg"></div>
    </div>

    <!-- HISTORIAL DE PAUSAS -->
    <div class="card">
      <h3>Mi historial de hoy</h3>
      <div id="historialBox"><span class="small">Sin registros todavía.</span></div>
    </div>

    <!-- TELEFONOS DE LA PC -->
    <div class="card hidden" id="telefonosCard">
      <h3>📞 Teléfonos de tu PC</h3>
      <div id="telefonosBox"></div>
    </div>

    <!-- TAREAS DE SUPERVISOR -->
    <div class="card hidden" id="tareasCard">
      <h3>⚡ Tareas asignadas</h3>
      <div id="tareasBox"></div>
      <div id="ultimaTareaBox"></div>
    </div>

    <!-- NOVEDADES -->
    <div class="card" id="novedadesCard">
      <h3>⚠️ Novedades pendientes <span id="novedadesBadge" class="badge" style="display:none;background:#d93025;color:#fff;font-size:12px"></span></h3>
      <div id="novedadesBox">Cargando novedades...</div>
    </div>

    <!-- RECEPCION -->
    <div class="card">
      <h3>Recepción de turno</h3>

      <label>Operador que entrega</label>
      <input id="entrega" placeholder="Nombre del operador que entrega" />

      <div class="grid">
        <div>
          <label>Puesto en orden</label>
          <select id="puestoOrden">
            <option>Sí</option>
            <option>No</option>
          </select>
        </div>

        <div>
          <label>Estados WhatsApp OK</label>
          <select id="whatsappOk">
            <option>Sí</option>
            <option>No</option>
          </select>
        </div>

        <div>
          <label>Caja correcta</label>
          <select id="cajaOk" onchange="toggleDiferenciaCaja()">
            <option>Sí</option>
            <option>No</option>
          </select>
        </div>

        <div>
          <label>Revinculación OK</label>
          <select id="revinculacionOk">
            <option>Sí</option>
            <option>No</option>
          </select>
        </div>

        <div>
          <label>Limpieza cumplida</label>
          <select id="limpiezaCumplida">
            <option>Sí</option>
            <option>No</option>
            <option>No corresponde</option>
          </select>
        </div>
      </div>

      <div id="diferenciaCajaWrap" style="display:none">
        <label>Diferencia de caja / detalle</label>
        <textarea id="diferenciaCaja" placeholder="Detalle de la diferencia"></textarea>
      </div>

      <label>Observaciones</label>
      <textarea id="obsRecepcion" placeholder="Observaciones del turno recibido"></textarea>

      <button class="primary" onclick="guardarRecepcion()">Guardar recepción</button>
      <div id="recepcionMsg" class="msg"></div>
    </div>

    <!-- REPORTAR NOVEDAD -->
    <div class="card">
      <h3>Reportar novedad</h3>

      <label>Tipo</label>
      <select id="tipoNovedad">
        <option>Diferencia caja</option>
        <option>Reclamo</option>
        <option>Limpieza</option>
        <option>Otro</option>
      </select>

      <label>Prioridad</label>
      <select id="prioridadNovedad">
        <option>Media</option>
        <option>Alta</option>
        <option>Baja</option>
      </select>

      <label>Detalle</label>
      <textarea id="detalleNovedad" placeholder="Detalle de la novedad"></textarea>

      <label>Observaciones</label>
      <textarea id="obsNovedad" placeholder="Observaciones adicionales"></textarea>

      <button class="primary" onclick="reportarNovedad()">Reportar novedad</button>
      <div id="novedadMsg" class="msg"></div>
    </div>

  </div>
</div>

<!-- FLOATING WIDGET -->
<div id="floatWidget" class="hidden">
  <div class="fw-actions hidden" id="fwActions">
    <button class="fw-btn fw-btn-bano" id="fwBanoBtn" onclick="banoToggle()">
      🚽
      <span class="fw-tooltip" id="fwBanoTip">Baño</span>
    </button>
    <button class="fw-btn fw-btn-fumar" id="fwFumarBtn" onclick="fumarToggle()">
      🚬
      <span class="fw-tooltip" id="fwFumarTip">Fumar</span>
    </button>
    <button class="fw-btn fw-btn-limpieza" id="fwLimpiezaBtn" onclick="limpiezaToggle()">
      🧹
      <span class="fw-tooltip" id="fwLimpiezaTip">Limpieza</span>
    </button>
  </div>
  <button class="fw-gear" id="fwGear" onclick="fwToggle()">⚙️</button>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyRaRvPoOZRStLWkfI-RECpYZ_6D72QTaqf_iAsZOdfmYWrwW-5fXlYDzJ5AkpUfjMr/exec";

  let operador = JSON.parse(localStorage.getItem("operadorActivo") || "null");

  window.onload = function () {
    if (operador) {
      mostrarApp();
    }
  };

  async function api(params) {
    const url = API_URL + "?" + new URLSearchParams({ ...params, _t: Date.now() }).toString();

    const res = await fetch(url, { cache: "no-store" });
    const text = await res.text();

    try {
      return JSON.parse(text);
    } catch (e) {
      console.error("Respuesta no JSON:", text);
      return { ok: false, error: "La API no devolvió JSON válido." };
    }
  }

  function setMsg(id, msg) {
    const el = document.getElementById(id);
    if (el) el.innerText = msg || "";
  }

  let _modoCoberturaActivo = false;

  async function login() {
    const nombre = document.getElementById("loginNombre").value.trim();
    const pin = document.getElementById("loginPin").value.trim();
    const pcAsignada = document.getElementById("pcSelector").value || "";

    if (!nombre || !pin) {
      setMsg("loginMsg", "Completá nombre y PIN.");
      return;
    }

    setMsg("loginMsg", "Validando...");

    const r = await api({ action: "login", nombre, pin, pcAsignada, modoCovertura: _modoCoberturaActivo });

    if (!r.ok) {
      setMsg("loginMsg", r.error || "No se pudo ingresar.");
      return;
    }

    if (r.requiereConfirmacionCobertura) {
      const confirma = confirm(
        `Ya tenés una sesión activa en PC ${r.sesionActiva.pc} desde las ${r.sesionActiva.hora}.\n\n¿Querés cubrir otra PC?`
      );
      if (confirma) {
        _modoCoberturaActivo = true;
        setMsg("loginMsg", "Modo cobertura activo. Presioná Ingresar nuevamente.");
      } else {
        setMsg("loginMsg", `Iniciá sesión desde PC ${r.sesionActiva.pc}.`);
      }
      return;
    }

    if (r.requierePcSelector) {
      await mostrarSelectorPC(_modoCoberturaActivo);
      setMsg("loginMsg", _modoCoberturaActivo
        ? "Modo cobertura: elegí qué PC vas a cubrir y presioná Ingresar."
        : "Sos franquero, elegí en qué PC te sentás y volvé a presionar Ingresar."
      );
      return;
    }

    _modoCoberturaActivo = false;
    operador = r.operador;
    localStorage.setItem("operadorActivo", JSON.stringify(operador));

    await api({ action: "ficharingreso", nombre: operador.nombre });

    if (r.cierresForzosos && r.cierresForzosos.length) {
      alert("Se cerraron sesiones expiradas: " + r.cierresForzosos.join(", "));
    }

    mostrarApp();
  }

  async function mostrarSelectorPC(esCobertura) {
    const wrap = document.getElementById("pcSelectorWrap");
    const sel = document.getElementById("pcSelector");
    const label = document.getElementById("pcSelectorLabel");
    const r = await api({ action: "getpcs" });
    sel.innerHTML = "";
    (r.pcs || []).forEach(p => {
      const opt = document.createElement("option");
      opt.value = p.pc;
      opt.textContent = p.pc;
      sel.appendChild(opt);
    });
    label.textContent = esCobertura ? "PC que vas a cubrir" : "PC en la que te sentás (franquero)";
    wrap.classList.remove("hidden");
  }

  async function mostrarApp() {
    document.getElementById("loginCard").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("operadorInfo").innerHTML = `
      <span class="badge"><b>${operador.nombre}</b></span>
      <button class="secondary" style="width:auto;padding:6px 14px;margin:0 0 0 8px;font-size:13px;" onclick="mostrarCambioPin()">🔑 Cambiar PIN</button>
      <span class="badge">Turno: ${operador.turno}</span>
      <span class="badge">PC: ${operador.pc}</span>
      <span class="badge">${operador.modoCovertura ? 'Cubriendo' : 'Tipo: ' + operador.tipo}</span>
    `;

    const ant = localStorage.getItem("operadorAnterior") || "";
    if (ant) document.getElementById("entrega").value = ant;

    cargarNovedades();
    historialRenderizar(historialCargar());
    fwMostrar();

    await sincronizarEstadoPausas();
    cargarLimpiezaHoy();
    cargarTelefonosPC();
    cargarNovedades();
    cargarTareas();
    toggleDiferenciaCaja();
  }

  async function sincronizarEstadoPausas() {
    const r = await api({ action: "getmispausas", nombre: operador.nombre });
    if (r.ok) {
      pausaBano = !!r.bano;
      pausaFumar = !!r.fumar;
      pausaLimpieza = !!r.limpieza;
    }
    actualizarBotones();
  }

  async function cargarLimpiezaHoy() {
    const r = await api({ action: "getlimpiezahoy" });
    const card = document.getElementById("limpiezaAvisoCard");
    const box  = document.getElementById("limpiezaAvisoBox");
    if (!r.ok || !r.pc) { card.classList.add("hidden"); return; }

    const meToca = String(r.pc).toLowerCase() === String(operador.pc || "").toLowerCase();
    const mananaInfo = r.manana
      ? `<div class="small" style="margin-top:6px">Mañana limpia <b>${r.manana}</b></div>`
      : "";

    box.innerHTML = meToca
      ? `<div class="alert">Hoy <b>${r.pc}</b> tiene la limpieza — te toca a vos.</div>
         ${mananaInfo}
         <span class="small">Rotación: ${r.rotacion.join(" → ")}</span>`
      : `<div class="alert ok">Hoy limpia <b>${r.pc}</b>.</div>
         ${mananaInfo}
         <span class="small">Rotación: ${r.rotacion.join(" → ")}</span>`;
    card.classList.remove("hidden");
  }

  function _telefsKey() { return "telefsEstado_" + (operador.pc || ""); }

  function _telefsCargarEstado() {
    try { return JSON.parse(localStorage.getItem(_telefsKey()) || "{}"); } catch { return {}; }
  }

  function _telefsPersistir(estado) {
    localStorage.setItem(_telefsKey(), JSON.stringify(estado));
  }

  async function cargarTelefonosPC() {
    if (!operador.pc) return;
    const r = await api({ action: "gettelefonospc", pc: operador.pc });
    const card = document.getElementById("telefonosCard");
    const box  = document.getElementById("telefonosBox");
    if (!r.ok || !r.telefonos.length) { card.classList.add("hidden"); return; }

    window._telefsData = r.telefonos;
    renderTelefonos();
    card.classList.remove("hidden");
  }

  // Clave de estado por índice (no por nombre) para evitar colisiones si t.linea es undefined
  function _telefKey(idx) { return "t" + idx; }

  function renderTelefonos() {
    const box = document.getElementById("telefonosBox");
    const estado = _telefsCargarEstado();
    const telefonos = window._telefsData || [];

    box.innerHTML = telefonos.map((t, idx) => {
      const key = _telefKey(idx);
      const st = estado[key] || {};
      const caido = st.caido || false;
      const nota = st.nota || "";
      const label = t.linea || ("Tel " + (idx + 1));
      return `
        <div class="telef-item${caido ? " caido" : ""}" data-tidx="${idx}">
          <div>
            <span class="badge"><b>${label}</b> · ${t.tipo || ""} · ${t.numero || ""}</span>
            ${nota ? `<span class="telef-nota">📝 ${nota}</span>` : ""}
          </div>
          <button class="btn-icon tf-btn-caido" title="${caido ? "Restaurar" : "Marcar caído"}">${caido ? "✅" : "📵"}</button>
          <button class="btn-icon tf-btn-nota"  title="Agregar nota">💬</button>
          <button class="btn-icon tf-btn-log"   title="Historial de caídas">ℹ️</button>
        </div>`;
    }).join("");

    // Event delegation — un solo listener para todo el box
    box.onclick = (e) => {
      const btn = e.target.closest(".btn-icon");
      if (!btn) return;
      const item = btn.closest("[data-tidx]");
      if (!item) return;
      const idx = parseInt(item.dataset.tidx);
      if (isNaN(idx)) return;
      if (btn.classList.contains("tf-btn-caido")) _toggleCaido(idx);
      else if (btn.classList.contains("tf-btn-nota"))  _editarNota(idx, item);
      else if (btn.classList.contains("tf-btn-log"))   _mostrarLog(idx, item);
    };
  }

  async function _toggleCaido(idx) {
    const estado = _telefsCargarEstado();
    const key = _telefKey(idx);
    if (!estado[key]) estado[key] = {};
    const ahora = !estado[key].caido;
    estado[key].caido = ahora;
    _telefsPersistir(estado);
    renderTelefonos();

    const t = (window._telefsData || [])[idx];
    const linea = t ? (t.linea || "") : "";
    if (ahora) {
      const motivo = prompt("Motivo de la caída (opcional):") || "";
      await api({ action: "telefonocaido", nombre: operador.nombre, pc: operador.pc, linea, motivo });
    } else {
      await api({ action: "telefonolevantado", nombre: operador.nombre, pc: operador.pc, linea });
    }
  }

  async function _mostrarLog(idx, item) {
    const existente = item.querySelector(".telef-log-panel");
    if (existente) { existente.remove(); return; }

    const t = (window._telefsData || [])[idx];
    const linea = t ? (t.linea || "") : "";
    const r = await api({ action: "getlogtelefono", linea, pc: operador.pc });
    const panel = document.createElement("div");
    panel.className = "telef-log-panel";

    if (!r.ok || !r.log || !r.log.length) {
      panel.innerHTML = '<span class="small">Sin caídas registradas.</span>';
    } else {
      panel.innerHTML = r.log.map(e => `
        <div class="telef-log-entry">
          <span class="small"><b>Caída:</b> ${e.horaCaida || ""} — ${e.operadorCaida || ""}${e.motivo ? " · " + e.motivo : ""}</span><br>
          <span class="small">${e.estado === "Cerrada"
            ? "Levantado: " + (e.horaLevantado || "") + " (" + (e.duracion || 0) + " min) — " + (e.operadorLevanta || "")
            : "<b style='color:#f88'>Abierta</b>"
          }</span>
        </div>`).join("");
    }
    item.appendChild(panel);
  }

  function _editarNota(idx, item) {
    const estado = _telefsCargarEstado();
    const key = _telefKey(idx);
    const actual = (estado[key] || {}).nota || "";

    const yaAbierto = item.querySelector(".telef-nota-input");
    if (yaAbierto) { yaAbierto.focus(); return; }

    const inp = document.createElement("input");
    inp.className = "telef-nota-input";
    inp.value = actual;
    inp.placeholder = "Escribí una nota...";
    inp.maxLength = 80;
    item.appendChild(inp);
    inp.focus();

    function guardar() {
      const e2 = _telefsCargarEstado();
      if (!e2[key]) e2[key] = {};
      e2[key].nota = inp.value.trim();
      _telefsPersistir(e2);
      renderTelefonos();
    }
    inp.addEventListener("keydown", ev => { if (ev.key === "Enter") guardar(); if (ev.key === "Escape") renderTelefonos(); });
    inp.addEventListener("blur", guardar);
  }

  function mostrarCambioPin() {
    document.getElementById("cambiarPinCard").classList.remove("hidden");
    document.getElementById("pinActual").value = "";
    document.getElementById("pinNuevo").value = "";
    document.getElementById("pinNuevoConfirm").value = "";
    setMsg("cambiarPinMsg", "");
  }

  function ocultarCambioPin() {
    document.getElementById("cambiarPinCard").classList.add("hidden");
  }

  async function cambiarPin() {
    const pinActual = document.getElementById("pinActual").value.trim();
    const pinNuevo = document.getElementById("pinNuevo").value.trim();
    const pinConfirm = document.getElementById("pinNuevoConfirm").value.trim();

    if (!pinActual || !pinNuevo || !pinConfirm) {
      setMsg("cambiarPinMsg", "Completá todos los campos.");
      return;
    }

    if (pinNuevo !== pinConfirm) {
      setMsg("cambiarPinMsg", "Los PINs nuevos no coinciden.");
      return;
    }

    setMsg("cambiarPinMsg", "Guardando...");

    const r = await api({
      action: "cambiarpin",
      nombre: operador.nombre,
      pinActual,
      pinNuevo
    });

    if (r.mensaje === "API activa") {
      setMsg("cambiarPinMsg", "El Apps Script deployed NO tiene la acción 'cambiarpin'. Necesitás crear una NUEVA implementación (no solo guardar el código).");
      return;
    }

    if (r.ok && r.debug && r.debug.nuevoValor) {
      setMsg("cambiarPinMsg", `PIN actualizado correctamente (fila ${r.debug.fila}, valor: ${r.debug.nuevoValor}).`);
      setTimeout(ocultarCambioPin, 2500);
    } else if (r.ok) {
      setMsg("cambiarPinMsg", "Respuesta ok pero sin confirmación de escritura. Revisá la implementación del Apps Script.");
    } else {
      const debug = r.debug ? "\nDEBUG: " + JSON.stringify(r.debug) : "";
      setMsg("cambiarPinMsg", (r.error || "No se pudo actualizar el PIN.") + debug);
    }
  }

  async function cerrarSesion() {
    if (operador && operador.nombre) {
      localStorage.setItem("operadorAnterior", operador.nombre);
    }
    const r = await api({ action: "ficharsalida", nombre: operador.nombre });
    if (r && r.pausasCerradas && r.pausasCerradas.length) {
      alert("Se cerraron pausas abiertas: " + r.pausasCerradas.join(", "));
    }
    localStorage.removeItem("operadorActivo");
    localStorage.removeItem("historialPausas");
    operador = null;
    location.reload();
  }

  // HISTORIAL — persiste durante toda la sesión del operador,
  // se borra solo al cerrar sesión (no por cambio de día / medianoche)
  function historialCargar() {
    const raw = localStorage.getItem("historialPausas");
    let data = null;
    try { data = JSON.parse(raw); } catch(e) {}
    if (!data) {
      data = { items: [] };
      localStorage.setItem("historialPausas", JSON.stringify(data));
    }
    if (!data.items) data.items = [];
    return data;
  }

  function historialAgregar(item) {
    const data = historialCargar();
    data.items.push(item);
    localStorage.setItem("historialPausas", JSON.stringify(data));
    historialRenderizar(data);
  }

  function historialActualizarUltimo(campos) {
    const data = historialCargar();
    for (let idx = data.items.length - 1; idx >= 0; idx--) {
      const it = data.items[idx];
      if (it && typeof it === "object" && it.tipo === campos.tipo && !it.fin) {
        Object.assign(it, campos);
        break;
      }
    }
    localStorage.setItem("historialPausas", JSON.stringify(data));
    historialRenderizar(data);
  }

  function historialRenderizar(data) {
    const box = document.getElementById("historialBox");
    if (!data || !data.items.length) {
      box.innerHTML = `<span class="small">Sin registros todavía.</span>`;
      return;
    }

    const iconos = { "baño": "🚽", "fumar": "🚬", "limpieza": "🧹", "tarea": "⚡", "info": "ℹ️" };
    const labels = { "baño": "Baño", "fumar": "Fumar", "limpieza": "Limpieza", "tarea": "Tarea", "info": "Info" };

    // Filtrar items inválidos (strings u objetos sin .tipo) que pudieran haber quedado
    const items = data.items.filter(i => i && typeof i === "object" && i.tipo);

    if (!items.length) {
      box.innerHTML = `<span class="small">Sin registros todavía.</span>`;
      return;
    }

    box.innerHTML = items.map(i => {
      const duracion = i.minutos != null
        ? `${i.minutos} min${i.excedio === "Sí" ? " ⚠️" : ""}`
        : "en curso...";
      const fin = i.fin ? ` → ${i.fin}` : "";
      const label = i.label || (labels[i.tipo] || i.tipo);
      return `<div class="novedad" style="padding:10px 14px;margin-bottom:8px;">
        ${iconos[i.tipo] || "📌"} <b>${label}</b>
        ${i.inicio ? `&nbsp;·&nbsp; ${i.inicio}${fin}` : ""}
        &nbsp;·&nbsp; <span class="small">${duracion}</span>
      </div>`;
    }).join("");
  }

  const PAUSAS_CONFIG = {
    bano:     { tipo: "baño",     accionInicio: "banoinicio",     accionFin: "banofin",     labelInicio: "🚽 Voy al baño",      labelFin: "🚽 Volví del baño",  fwTipInicio: "Iniciar baño",     fwTipFin: "Finalizar baño",     mainBtn: "banoBtn",     fwBtn: "fwBanoBtn",     fwTip: "fwBanoTip" },
    fumar:    { tipo: "fumar",    accionInicio: "fumarinicio",    accionFin: "fumarfin",    labelInicio: "🚬 Voy a fumar",      labelFin: "🚬 Volví de fumar",  fwTipInicio: "Iniciar fumar",    fwTipFin: "Finalizar fumar",    mainBtn: "fumarBtn",    fwBtn: "fwFumarBtn",    fwTip: "fwFumarTip" },
    limpieza: { tipo: "limpieza", accionInicio: "limpiezainicio", accionFin: "limpiezafin", labelInicio: "🧹 Iniciar limpieza", labelFin: "🧹 Terminar limpieza", fwTipInicio: "Iniciar limpieza", fwTipFin: "Finalizar limpieza", mainBtn: "limpiezaBtn", fwBtn: "fwLimpiezaBtn", fwTip: "fwLimpiezaTip" }
  };

  let _pausaEnCurso = false;

  async function pausaToggle(clave) {
    if (_pausaEnCurso) return;
    _pausaEnCurso = true;

    const cfg = PAUSAS_CONFIG[clave];
    const abierta = clave === "bano" ? pausaBano : clave === "fumar" ? pausaFumar : pausaLimpieza;

    // Deshabilitar todos los botones de pausa mientras procesa
    ["banoBtn","fumarBtn","limpiezaBtn","fwBanoBtn","fwFumarBtn","fwLimpiezaBtn"].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.disabled = true; el.style.opacity = "0.5"; }
    });

    setMsg("accionMsg", abierta ? `Cerrando ${cfg.tipo}...` : `Iniciando ${cfg.tipo}...`);

    const r = await api({
      action: abierta ? cfg.accionFin : cfg.accionInicio,
      nombre: operador.nombre,
      pcAsignada: operador.pc || ""
    });

    if (!r.ok) {
      setMsg("accionMsg", r.error || "Error.");
      if (r.bloqueoCruzado) alert("⚠️ " + r.error);
      _pausaEnCurso = false;
      actualizarBotones();
      return;
    }

    if (abierta) {
      historialActualizarUltimo({ tipo: cfg.tipo, fin: r.regreso || horaActual_(), minutos: r.minutos, excedio: r.excedio });
      setMsg("accionMsg", `Cerrado ${cfg.tipo}. Minutos: ${r.minutos} · Excedió: ${r.excedio}`);
    } else {
      historialAgregar({ tipo: cfg.tipo, inicio: r.inicio || horaActual_() });
      setMsg("accionMsg", `${cfg.tipo} iniciada: ${r.inicio || ""}`);
    }

    if (clave === "bano") pausaBano = !abierta;
    else if (clave === "fumar") pausaFumar = !abierta;
    else pausaLimpieza = !abierta;

    _pausaEnCurso = false;
    actualizarBotones();
  }

  function banoToggle()     { return pausaToggle("bano"); }
  function fumarToggle()    { return pausaToggle("fumar"); }
  function limpiezaToggle() { return pausaToggle("limpieza"); }

  function actualizarBotones() {
    const estados = { bano: pausaBano, fumar: pausaFumar, limpieza: pausaLimpieza };
    Object.keys(PAUSAS_CONFIG).forEach(k => {
      const cfg = PAUSAS_CONFIG[k];
      const abierta = estados[k];

      const main = document.getElementById(cfg.mainBtn);
      if (main) {
        main.textContent = abierta ? cfg.labelFin : cfg.labelInicio;
        main.classList.toggle("warning", !abierta);
        main.classList.toggle("success", abierta);
        main.disabled = false;
        main.style.opacity = "";
      }

      const fwTip = document.getElementById(cfg.fwTip);
      if (fwTip) fwTip.innerText = abierta ? cfg.fwTipFin : cfg.fwTipInicio;

      const fwBtn = document.getElementById(cfg.fwBtn);
      if (fwBtn) {
        fwBtn.style.background = abierta ? "#16a765" : "";
        fwBtn.disabled = false;
        fwBtn.style.opacity = "";
      }
    });
  }

  function horaActual_() {
    return new Date().toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function toggleDiferenciaCaja() {
    const ok = document.getElementById("cajaOk").value === "Sí";
    document.getElementById("diferenciaCajaWrap").style.display = ok ? "none" : "block";
  }

  async function guardarRecepcion() {
    const entrega = document.getElementById("entrega").value.trim();
    if (!entrega) {
      setMsg("recepcionMsg", "Completá el nombre del operador que entrega.");
      return;
    }
    setMsg("recepcionMsg", "Guardando recepción...");

    const r = await api({
      action: "recepcionturno",
      recibe: operador.nombre,
      nombre: operador.nombre,
      entrega: document.getElementById("entrega").value,
      puestoOrden: document.getElementById("puestoOrden").value,
      whatsappOk: document.getElementById("whatsappOk").value,
      cajaOk: document.getElementById("cajaOk").value,
      diferenciaCaja: document.getElementById("diferenciaCaja").value,
      revinculacionOk: document.getElementById("revinculacionOk").value,
      limpiezaCumplida: document.getElementById("limpiezaCumplida").value,
      observaciones: document.getElementById("obsRecepcion").value
    });

    setMsg(
      "recepcionMsg",
      r.ok ? "Recepción guardada correctamente." : r.error
    );
  }

  async function reportarNovedad() {
    const detalle = document.getElementById("detalleNovedad").value.trim();

    if (!detalle) {
      setMsg("novedadMsg", "Completá el detalle de la novedad.");
      return;
    }

    setMsg("novedadMsg", "Guardando novedad...");

    const r = await api({
      action: "novedad",
      nombre: operador.nombre,
      tipo: document.getElementById("tipoNovedad").value,
      prioridad: document.getElementById("prioridadNovedad").value,
      detalle: detalle,
      observaciones: document.getElementById("obsNovedad").value
    });

    if (r.ok) {
      setMsg("novedadMsg", `Novedad registrada. ID: ${r.id || ""}`);
      document.getElementById("detalleNovedad").value = "";
      document.getElementById("obsNovedad").value = "";
      cargarNovedades();
    } else {
      setMsg("novedadMsg", r.error || "No se pudo registrar novedad.");
    }
  }

  async function cargarNovedades() {
    const box = document.getElementById("novedadesBox");
    box.innerHTML = "Cargando novedades...";

    const r = await api({
      action: "getnovedadespendientes",
      pc: operador.pc
    });

    if (!r.ok) {
      box.innerHTML = `<div class="alert">Error cargando novedades: ${r.error || ""}</div>`;
      return;
    }

    if (!r.novedades || r.novedades.length === 0) {
      box.innerHTML = `<div class="alert ok">Sin novedades pendientes para esta PC.</div>`;
      return;
    }

    const badge = document.getElementById("novedadesBadge");
    badge.textContent = r.novedades.length;
    badge.style.display = "inline-block";

    box.innerHTML = "";

    r.novedades.forEach(n => {
      const div = document.createElement("div");
      div.className = "novedad";
      const notaActual = n.resolucion || "";

      div.innerHTML = `
        <b>${n.tipo || "Novedad"}</b> · ${n.prioridad || ""} · ${n.estado || ""}<br>
        <span class="small">
          Fecha: ${n.fecha || ""} | Turno: ${n.turno || ""} | PC: ${n.pc || ""} | Operador: ${n.operador || ""}
        </span>
        <p>${n.detalle || ""}</p>
        ${notaActual ? `<p class="small" style="color:#f0b429">📝 ${notaActual}</p>` : ""}

        <div class="row">
          <button class="warning" onclick="actualizarNovedad('${n.id}', 'En seguimiento')">En seguimiento</button>
          <button class="success" onclick="actualizarNovedad('${n.id}', 'Resuelta')">Resuelta</button>
          <button class="secondary" onclick="toggleNotaNovedad('${n.id}', this)" style="width:auto;padding:6px 12px">📝 Nota</button>
        </div>
        <div id="nota-${n.id}" style="display:none;margin-top:6px">
          <textarea class="novedad-nota-input" placeholder="Agregar nota..." rows="2">${notaActual}</textarea>
          <button class="primary" onclick="guardarNotaNovedad('${n.id}', this)" style="margin-top:4px">Guardar nota</button>
        </div>
      `;

      box.appendChild(div);
    });
  }

  async function actualizarNovedad(id, estado) {
    let resolucion = "";

    if (estado === "Resuelta") {
      resolucion = prompt("Detalle de resolución:") || "";
    } else {
      resolucion = "Tomado en seguimiento";
    }

    const r = await api({
      action: "actualizarnovedad",
      id,
      estado,
      revisadoPor: operador.nombre,
      resolucion
    });

    if (r.ok) {
      cargarNovedades();
    } else {
      alert(r.error || "No se pudo actualizar la novedad.");
    }
  }

  function toggleNotaNovedad(id, btn) {
    const wrap = document.getElementById("nota-" + id);
    if (!wrap) return;
    const visible = wrap.style.display !== "none";
    wrap.style.display = visible ? "none" : "block";
    if (!visible) wrap.querySelector("textarea").focus();
  }

  async function guardarNotaNovedad(id, btn) {
    const wrap = document.getElementById("nota-" + id);
    const nota = wrap ? wrap.querySelector("textarea").value.trim() : "";
    const r = await api({ action: "notarnovedad", id, nota });
    if (r.ok) {
      wrap.style.display = "none";
      cargarNovedades();
    } else {
      alert(r.error || "No se pudo guardar la nota.");
    }
  }

  async function cargarTareas() {
    if (!operador || !operador.pc) return;
    const r = await api({ action: "gettareaspc", pc: operador.pc });
    const card = document.getElementById("tareasCard");
    const box = document.getElementById("tareasBox");
    const ultimaBox = document.getElementById("ultimaTareaBox");

    if (!r.ok) { card.classList.add("hidden"); return; }

    if (r.ultimaCompletada) {
      ultimaBox.innerHTML = `<div class="alert ok" style="margin-top:8px">Última tarea completada: <b>${r.ultimaCompletada.tarea}</b> — ${r.ultimaCompletada.fechaCompletada || ""} por ${r.ultimaCompletada.completoPor || ""}</div>`;
    } else {
      ultimaBox.innerHTML = "";
    }

    if (!r.tareas.length) {
      box.innerHTML = "";
      card.classList[r.ultimaCompletada ? "remove" : "add"]("hidden");
      return;
    }

    box.innerHTML = r.tareas.map(t => `
      <div class="novedad">
        <b>${t.tarea}</b><br>
        <span class="small">Asignada: ${t.fecha || ""}</span>
        <div class="row" style="margin-top:8px">
          <button class="success" onclick="completarTarea(${t.fila}, '${(t.tarea || "").replace(/'/g, "\\'")}')">Completar</button>
        </div>
      </div>
    `).join("");

    card.classList.remove("hidden");
  }

  async function completarTarea(fila, texto) {
    const r = await api({ action: "completartarea", tareaId: fila, nombre: operador.nombre });
    if (r.ok) {
      historialAgregar({ tipo: "tarea", inicio: horaActual_(), label: "Tarea: " + texto, minutos: null });
      cargarTareas();
    }
  }

  let _verifFails = 0;
  setInterval(async () => {
    if (!operador) return;

    try {
      const activo = await api({ action: "verificaractivo", nombre: operador.nombre });
      // Solo cerrar sesión si el backend devuelve EXPLÍCITAMENTE activo:false (no undefined, no error)
      if (activo && activo.ok === true && activo.activo === false) {
        _verifFails++;
        // Necesita 2 confirmaciones consecutivas para evitar falsos positivos por race conditions
        if (_verifFails >= 2) {
          alert("Se inhabilitó tu acceso. Comunicarte con tu superior.");
          localStorage.removeItem("operadorActivo");
          localStorage.removeItem("historialPausas");
          operador = null;
          location.reload();
          return;
        }
      } else {
        _verifFails = 0;
      }
    } catch (e) {
      _verifFails = 0;
    }

    cargarNovedades();
    cargarTareas();
  }, 30000);

  // FLOATING WIDGET
  const fwWidget = document.getElementById("floatWidget");
  const fwActions = document.getElementById("fwActions");
  let fwOpen = false;
  let pausaBano = false;
  let pausaFumar = false;
  let pausaLimpieza = false;

  function fwMostrar() {
    fwWidget.classList.remove("hidden");
  }

  function fwToggle() {
    fwOpen = !fwOpen;
    fwActions.classList.toggle("hidden", !fwOpen);
  }

  // Drag
  const gear = document.getElementById("fwGear");
  let dragging = false, dragStartX, dragStartY, widgetStartX, widgetStartY;

  gear.addEventListener("mousedown", e => {
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    const rect = fwWidget.getBoundingClientRect();
    widgetStartX = rect.left;
    widgetStartY = rect.top;
    e.preventDefault();
  });

  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    fwWidget.style.left   = (widgetStartX + dx) + "px";
    fwWidget.style.top    = (widgetStartY + dy) + "px";
    fwWidget.style.right  = "auto";
    fwWidget.style.bottom = "auto";
  });

  document.addEventListener("mouseup", () => { dragging = false; });
</script>
</body>
</html>
