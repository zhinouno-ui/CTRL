
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTRL PRO - Panel Operativo</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #111;
      color: #fff;
    }

    .container {
      max-width: 1150px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1f1f1f;
      padding: 20px;
      margin-bottom: 18px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,.25);
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    input, select, textarea, button {
      width: 100%;
      padding: 12px;
      margin: 6px 0 12px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
    }

    input, select, textarea {
      background: #fff;
      color: #111;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    button {
      cursor: pointer;
      font-weight: bold;
      background: #f1f1f1;
      color: #111;
    }

    .danger {
      background: #d93025;
      color: white;
    }

    .success {
      background: #16a765;
      color: white;
    }

    .warning {
      background: #fbbc04;
      color: #111;
    }

    .secondary {
      background: #666;
      color: white;
    }

    .primary {
      background: #4b5cff;
      color: white;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .row button {
      flex: 1;
      min-width: 160px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .hidden {
      display: none;
    }

    .badge {
      display: inline-block;
      background: #333;
      padding: 8px 12px;
      border-radius: 999px;
      margin: 4px 5px 4px 0;
    }

    .msg {
      color: #ddd;
      font-size: 14px;
      margin-top: 6px;
      white-space: pre-wrap;
    }

    .alert {
      background: #392222;
      border-left: 5px solid #d93025;
      padding: 14px;
      border-radius: 10px;
      margin: 10px 0;
    }

    .alert.ok {
      background: #173321;
      border-left-color: #16a765;
    }

    .novedad {
      background: #2c2c2c;
      border-left: 5px solid #fbbc04;
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .small {
      color: #bbb;
      font-size: 13px;
    }

    /* FLOATING WIDGET */
    #floatWidget {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      user-select: none;
    }

    #floatWidget .fw-gear {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #4b5cff;
      border: none;
      font-size: 22px;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
      transition: background .2s;
    }

    #floatWidget .fw-gear:active {
      cursor: grabbing;
    }

    #floatWidget .fw-gear:hover {
      background: #3a4bdd;
    }

    #floatWidget .fw-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    #floatWidget .fw-actions.hidden {
      display: none;
    }

    .fw-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,.4);
      position: relative;
      transition: transform .15s, background .2s;
    }

    .fw-btn:hover {
      transform: scale(1.1);
    }

    .fw-btn .fw-tooltip {
      position: absolute;
      right: 58px;
      background: #222;
      color: #fff;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
    }

    .fw-btn:hover .fw-tooltip {
      opacity: 1;
    }

    .fw-btn-bano  { background: #1a73e8; }
    .fw-btn-fumar { background: #5f6368; }
  </style>
</head>

<body>
<div class="container">

  <!-- LOGIN -->
  <div class="card" id="loginCard">
    <h1>CTRL PRO</h1>
    <h3>Ingreso al panel operativo</h3>

    <label>Operador</label>
    <input id="loginNombre" placeholder="Ej: Nombre" />

    <label>PIN</label>
    <input id="loginPin" type="password" placeholder="PIN" />

    <button class="primary" onclick="login()">Ingresar</button>
    <div id="loginMsg" class="msg"></div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">

    <!-- TURNO ACTIVO -->
    <div class="card">
      <h2>Turno activo</h2>
      <div id="operadorInfo"></div>
      <button class="secondary" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>

    <!-- CAMBIO DE PIN -->
    <div class="card hidden" id="cambiarPinCard">
      <h3>Cambiar PIN</h3>

      <label>PIN actual</label>
      <input id="pinActual" type="password" placeholder="PIN actual" />

      <label>PIN nuevo</label>
      <input id="pinNuevo" type="password" placeholder="PIN nuevo" />

      <label>Confirmar PIN nuevo</label>
      <input id="pinNuevoConfirm" type="password" placeholder="Repetir PIN nuevo" />

      <div class="row">
        <button class="primary" onclick="cambiarPin()">Guardar</button>
        <button class="secondary" onclick="ocultarCambioPin()">Cancelar</button>
      </div>

      <div id="cambiarPinMsg" class="msg"></div>
    </div>

    <!-- ACCIONES -->
    <div class="card">
      <h3>Acciones rápidas</h3>

      <div class="row">
        <button class="warning" onclick="banoInicio()">Voy al baño</button>
        <button class="success" onclick="banoFin()">Volví del baño</button>

        <button class="warning" onclick="fumarInicio()">Voy a fumar</button>
        <button class="success" onclick="fumarFin()">Volví de fumar</button>
      </div>

      <div id="accionMsg" class="msg"></div>
    </div>

    <!-- HISTORIAL DE PAUSAS -->
    <div class="card">
      <h3>Mi historial de hoy</h3>
      <div id="historialBox"><span class="small">Sin registros todavía.</span></div>
    </div>

    <!-- NOVEDADES -->
    <div class="card" id="novedadesCard">
      <h3>⚠️ Novedades pendientes</h3>
      <div id="novedadesBox">Cargando novedades...</div>
    </div>

    <!-- RECEPCION -->
    <div class="card">
      <h3>Recepción de turno</h3>

      <label>Operador que entrega</label>
      <input id="entrega" placeholder="Nombre del operador que entrega" />

      <div class="grid">
        <div>
          <label>Puesto en orden</label>
          <select id="puestoOrden">
            <option>Sí</option>
            <option>No</option>
          </select>
        </div>

        <div>
          <label>Estados WhatsApp OK</label>
          <select id="whatsappOk">
            <option>Sí</option>
            <option>No</option>
          </select>
        </div>

        <div>
          <label>Caja correcta</label>
          <select id="cajaOk">
            <option>Sí</option>
            <option>No</option>
          </select>
        </div>

        <div>
          <label>Revinculación OK</label>
          <select id="revinculacionOk">
            <option>Sí</option>
            <option>No</option>
          </select>
        </div>

        <div>
          <label>Limpieza cumplida</label>
          <select id="limpiezaCumplida">
            <option>Sí</option>
            <option>No</option>
            <option>No corresponde</option>
          </select>
        </div>
      </div>

      <label>Diferencia de caja / detalle</label>
      <textarea id="diferenciaCaja" placeholder="Detalle si hay diferencia"></textarea>

      <label>Teléfonos caídos</label>
      <textarea id="telefonosCaidos" placeholder="Ej: WP1 caído, soporte en revisión"></textarea>

      <label>Observaciones</label>
      <textarea id="obsRecepcion" placeholder="Observaciones del turno recibido"></textarea>

      <button class="primary" onclick="guardarRecepcion()">Guardar recepción</button>
      <div id="recepcionMsg" class="msg"></div>
    </div>

    <!-- REPORTAR NOVEDAD -->
    <div class="card">
      <h3>Reportar novedad</h3>

      <label>Tipo</label>
      <select id="tipoNovedad">
        <option>Telefono caido</option>
        <option>Diferencia caja</option>
        <option>Reclamo</option>
        <option>Limpieza</option>
        <option>Otro</option>
      </select>

      <label>Prioridad</label>
      <select id="prioridadNovedad">
        <option>Media</option>
        <option>Alta</option>
        <option>Baja</option>
      </select>

      <label>Detalle</label>
      <textarea id="detalleNovedad" placeholder="Detalle de la novedad"></textarea>

      <label>Observaciones</label>
      <textarea id="obsNovedad" placeholder="Observaciones adicionales"></textarea>

      <button class="primary" onclick="reportarNovedad()">Reportar novedad</button>
      <div id="novedadMsg" class="msg"></div>
    </div>

  </div>
</div>

<!-- FLOATING WIDGET -->
<div id="floatWidget" class="hidden">
  <div class="fw-actions hidden" id="fwActions">
    <button class="fw-btn fw-btn-bano" id="fwBanoBtn" onclick="fwToggleBano()">
      🚿
      <span class="fw-tooltip" id="fwBanoTip">Baño</span>
    </button>
    <button class="fw-btn fw-btn-fumar" id="fwFumarBtn" onclick="fwToggleFumar()">
      🚬
      <span class="fw-tooltip" id="fwFumarTip">Fumar</span>
    </button>
  </div>
  <button class="fw-gear" id="fwGear" onclick="fwToggle()">⚙️</button>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyRaRvPoOZRStLWkfI-RECpYZ_6D72QTaqf_iAsZOdfmYWrwW-5fXlYDzJ5AkpUfjMr/exec";

  let operador = JSON.parse(localStorage.getItem("operadorActivo") || "null");

  window.onload = function () {
    if (operador) {
      mostrarApp();
    }
  };

  async function api(params) {
    const url = API_URL + "?" + new URLSearchParams({ ...params, _t: Date.now() }).toString();

    const res = await fetch(url, { cache: "no-store" });
    const text = await res.text();

    try {
      return JSON.parse(text);
    } catch (e) {
      console.error("Respuesta no JSON:", text);
      return { ok: false, error: "La API no devolvió JSON válido." };
    }
  }

  function setMsg(id, msg) {
    const el = document.getElementById(id);
    if (el) el.innerText = msg || "";
  }

  async function login() {
    const nombre = document.getElementById("loginNombre").value.trim();
    const pin = document.getElementById("loginPin").value.trim();

    if (!nombre || !pin) {
      setMsg("loginMsg", "Completá nombre y PIN.");
      return;
    }

    setMsg("loginMsg", "Validando...");

    const r = await api({
      action: "login",
      nombre,
      pin
    });

    if (!r.ok) {
      setMsg("loginMsg", r.error || "No se pudo ingresar.");
      return;
    }

    operador = r.operador;
    localStorage.setItem("operadorActivo", JSON.stringify(operador));

    await api({ action: "ficharingreso", nombre: operador.nombre });

    mostrarApp();
  }

  function mostrarApp() {
    document.getElementById("loginCard").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("operadorInfo").innerHTML = `
      <span class="badge"><b>${operador.nombre}</b></span>
      <button class="secondary" style="width:auto;padding:6px 14px;margin:0 0 0 8px;font-size:13px;" onclick="mostrarCambioPin()">🔑 Cambiar PIN</button>
      <span class="badge">Turno: ${operador.turno}</span>
      <span class="badge">PC: ${operador.pc}</span>
      <span class="badge">Tipo: ${operador.tipo}</span>
    `;

    cargarNovedades();
    historialRenderizar(historialCargar());
    fwMostrar();
    fwActualizarTooltips();
  }

  function mostrarCambioPin() {
    document.getElementById("cambiarPinCard").classList.remove("hidden");
    document.getElementById("pinActual").value = "";
    document.getElementById("pinNuevo").value = "";
    document.getElementById("pinNuevoConfirm").value = "";
    setMsg("cambiarPinMsg", "");
  }

  function ocultarCambioPin() {
    document.getElementById("cambiarPinCard").classList.add("hidden");
  }

  async function cambiarPin() {
    const pinActual = document.getElementById("pinActual").value.trim();
    const pinNuevo = document.getElementById("pinNuevo").value.trim();
    const pinConfirm = document.getElementById("pinNuevoConfirm").value.trim();

    if (!pinActual || !pinNuevo || !pinConfirm) {
      setMsg("cambiarPinMsg", "Completá todos los campos.");
      return;
    }

    if (pinNuevo !== pinConfirm) {
      setMsg("cambiarPinMsg", "Los PINs nuevos no coinciden.");
      return;
    }

    setMsg("cambiarPinMsg", "Guardando...");

    const r = await api({
      action: "cambiarpin",
      nombre: operador.nombre,
      pinActual,
      pinNuevo
    });

    if (r.mensaje === "API activa") {
      setMsg("cambiarPinMsg", "El Apps Script deployed NO tiene la acción 'cambiarpin'. Necesitás crear una NUEVA implementación (no solo guardar el código).");
      return;
    }

    if (r.ok && r.debug && r.debug.nuevoValor) {
      setMsg("cambiarPinMsg", `PIN actualizado correctamente (fila ${r.debug.fila}, valor: ${r.debug.nuevoValor}).`);
      setTimeout(ocultarCambioPin, 2500);
    } else if (r.ok) {
      setMsg("cambiarPinMsg", "Respuesta ok pero sin confirmación de escritura. Revisá la implementación del Apps Script.");
    } else {
      const debug = r.debug ? "\nDEBUG: " + JSON.stringify(r.debug) : "";
      setMsg("cambiarPinMsg", (r.error || "No se pudo actualizar el PIN.") + debug);
    }
  }

  async function cerrarSesion() {
    await api({ action: "ficharsalida", nombre: operador.nombre });
    localStorage.removeItem("operadorActivo");
    localStorage.removeItem("historialPausas");
    operador = null;
    location.reload();
  }

  // HISTORIAL
  function historialCargar() {
    const hoy = new Date().toLocaleDateString("es-AR");
    const raw = localStorage.getItem("historialPausas");
    let data = null;
    try { data = JSON.parse(raw); } catch(e) {}
    if (!data || data.fecha !== hoy) {
      data = { fecha: hoy, items: [] };
      localStorage.setItem("historialPausas", JSON.stringify(data));
    }
    return data;
  }

  function historialAgregar(item) {
    const data = historialCargar();
    data.items.push(item);
    localStorage.setItem("historialPausas", JSON.stringify(data));
    historialRenderizar(data);
  }

  function historialActualizarUltimo(campos) {
    const data = historialCargar();
    const ultimo = data.items.findLast(i => i.tipo === campos.tipo && !i.fin);
    if (ultimo) Object.assign(ultimo, campos);
    localStorage.setItem("historialPausas", JSON.stringify(data));
    historialRenderizar(data);
  }

  function historialRenderizar(data) {
    const box = document.getElementById("historialBox");
    if (!data || !data.items.length) {
      box.innerHTML = `<span class="small">Sin registros todavía.</span>`;
      return;
    }

    box.innerHTML = data.items.map(i => {
      const icono = i.tipo === "baño" ? "🚿" : "🚬";
      const duracion = i.minutos != null
        ? `${i.minutos} min${i.excedio === "Sí" ? " ⚠️" : ""}`
        : "en curso...";
      const fin = i.fin ? ` → ${i.fin}` : "";
      return `<div class="novedad" style="padding:10px 14px;margin-bottom:8px;">
        ${icono} <b>${i.tipo === "baño" ? "Baño" : "Fumar"}</b>
        &nbsp;·&nbsp; Inicio: ${i.inicio}${fin}
        &nbsp;·&nbsp; <span class="small">${duracion}</span>
      </div>`;
    }).join("");
  }

  async function banoInicio() {
    setMsg("accionMsg", "Registrando salida al baño...");

    const r = await api({ action: "banoinicio", nombre: operador.nombre });

    if (r.ok) {
      historialAgregar({ tipo: "baño", inicio: r.inicio || horaActual_() });
      setMsg("accionMsg", `Baño iniciado: ${r.inicio || ""}`);
    } else {
      setMsg("accionMsg", r.error);
    }
  }

  async function banoFin() {
    setMsg("accionMsg", "Registrando regreso del baño...");

    const r = await api({ action: "banofin", nombre: operador.nombre });

    if (r.ok) {
      historialActualizarUltimo({ tipo: "baño", fin: r.regreso || horaActual_(), minutos: r.minutos, excedio: r.excedio });
      setMsg("accionMsg", `Regreso del baño.\nMinutos: ${r.minutos}\nExcedió: ${r.excedio}`);
    } else {
      setMsg("accionMsg", r.error);
    }
  }

  async function fumarInicio() {
    setMsg("accionMsg", "Registrando salida a fumar...");

    const r = await api({ action: "fumarinicio", nombre: operador.nombre });

    if (r.ok) {
      historialAgregar({ tipo: "fumar", inicio: r.inicio || horaActual_() });
      setMsg("accionMsg", `Fumar iniciado: ${r.inicio || ""}`);
    } else {
      setMsg("accionMsg", r.error);
    }
  }

  async function fumarFin() {
    setMsg("accionMsg", "Registrando regreso de fumar...");

    const r = await api({ action: "fumarfin", nombre: operador.nombre });

    if (r.ok) {
      historialActualizarUltimo({ tipo: "fumar", fin: r.regreso || horaActual_(), minutos: r.minutos, excedio: r.excedio });
      setMsg("accionMsg", `Regreso de fumar.\nMinutos: ${r.minutos}\nExcedió: ${r.excedio}`);
    } else {
      setMsg("accionMsg", r.error);
    }
  }

  function horaActual_() {
    return new Date().toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  async function guardarRecepcion() {
    setMsg("recepcionMsg", "Guardando recepción...");

    const r = await api({
      action: "recepcionturno",
      recibe: operador.nombre,
      nombre: operador.nombre,
      entrega: document.getElementById("entrega").value,
      puestoOrden: document.getElementById("puestoOrden").value,
      whatsappOk: document.getElementById("whatsappOk").value,
      cajaOk: document.getElementById("cajaOk").value,
      diferenciaCaja: document.getElementById("diferenciaCaja").value,
      revinculacionOk: document.getElementById("revinculacionOk").value,
      telefonosCaidos: document.getElementById("telefonosCaidos").value,
      limpiezaCumplida: document.getElementById("limpiezaCumplida").value,
      observaciones: document.getElementById("obsRecepcion").value
    });

    setMsg(
      "recepcionMsg",
      r.ok ? "Recepción guardada correctamente." : r.error
    );
  }

  async function reportarNovedad() {
    const detalle = document.getElementById("detalleNovedad").value.trim();

    if (!detalle) {
      setMsg("novedadMsg", "Completá el detalle de la novedad.");
      return;
    }

    setMsg("novedadMsg", "Guardando novedad...");

    const r = await api({
      action: "novedad",
      nombre: operador.nombre,
      tipo: document.getElementById("tipoNovedad").value,
      prioridad: document.getElementById("prioridadNovedad").value,
      detalle: detalle,
      observaciones: document.getElementById("obsNovedad").value
    });

    if (r.ok) {
      setMsg("novedadMsg", `Novedad registrada. ID: ${r.id || ""}`);
      document.getElementById("detalleNovedad").value = "";
      document.getElementById("obsNovedad").value = "";
      cargarNovedades();
    } else {
      setMsg("novedadMsg", r.error || "No se pudo registrar novedad.");
    }
  }

  async function cargarNovedades() {
    const box = document.getElementById("novedadesBox");
    box.innerHTML = "Cargando novedades...";

    const r = await api({
      action: "getnovedadespendientes",
      pc: operador.pc
    });

    if (!r.ok) {
      box.innerHTML = `<div class="alert">Error cargando novedades: ${r.error || ""}</div>`;
      return;
    }

    if (!r.novedades || r.novedades.length === 0) {
      box.innerHTML = `<div class="alert ok">Sin novedades pendientes para esta PC.</div>`;
      return;
    }

    box.innerHTML = "";

    r.novedades.forEach(n => {
      const div = document.createElement("div");
      div.className = "novedad";

      div.innerHTML = `
        <b>${n.tipo || "Novedad"}</b> · ${n.prioridad || ""} · ${n.estado || ""}<br>
        <span class="small">
          Fecha: ${n.fecha || ""} | Turno: ${n.turno || ""} | PC: ${n.pc || ""} | Operador: ${n.operador || ""}
        </span>
        <p>${n.detalle || ""}</p>
        <p class="small">${n.observaciones || ""}</p>

        <div class="row">
          <button class="warning" onclick="actualizarNovedad('${n.id}', 'En seguimiento')">
            En seguimiento
          </button>
          <button class="success" onclick="actualizarNovedad('${n.id}', 'Resuelta')">
            Resuelta
          </button>
        </div>
      `;

      box.appendChild(div);
    });

    alert("⚠️ Hay novedades pendientes para esta PC.");
  }

  async function actualizarNovedad(id, estado) {
    let resolucion = "";

    if (estado === "Resuelta") {
      resolucion = prompt("Detalle de resolución:") || "";
    } else {
      resolucion = "Tomado en seguimiento";
    }

    const r = await api({
      action: "actualizarnovedad",
      id,
      estado,
      revisadoPor: operador.nombre,
      resolucion
    });

    if (r.ok) {
      cargarNovedades();
    } else {
      alert(r.error || "No se pudo actualizar la novedad.");
    }
  }

  setInterval(() => {
    if (operador) cargarNovedades();
  }, 60000);

  // FLOATING WIDGET
  const fwWidget = document.getElementById("floatWidget");
  const fwActions = document.getElementById("fwActions");
  let fwOpen = false;
  let pausaBano = false;
  let pausaFumar = false;

  function fwMostrar() {
    fwWidget.classList.remove("hidden");
  }

  function fwToggle() {
    fwOpen = !fwOpen;
    fwActions.classList.toggle("hidden", !fwOpen);
  }

  function fwActualizarTooltips() {
    document.getElementById("fwBanoTip").innerText  = pausaBano  ? "Finalizar baño"  : "Iniciar baño";
    document.getElementById("fwFumarTip").innerText = pausaFumar ? "Finalizar fumar" : "Iniciar fumar";
    document.getElementById("fwBanoBtn").style.background  = pausaBano  ? "#16a765" : "#1a73e8";
    document.getElementById("fwFumarBtn").style.background = pausaFumar ? "#16a765" : "#5f6368";
  }

  async function fwToggleBano() {
    setMsg("accionMsg", pausaBano ? "Registrando regreso del baño..." : "Registrando salida al baño...");
    const r = await api({ action: pausaBano ? "banofin" : "banoinicio", nombre: operador.nombre });

    if (r.ok) {
      if (!pausaBano) {
        historialAgregar({ tipo: "baño", inicio: r.inicio || horaActual_() });
      } else {
        historialActualizarUltimo({ tipo: "baño", fin: r.regreso || horaActual_(), minutos: r.minutos, excedio: r.excedio });
      }
      pausaBano = !pausaBano;
      fwActualizarTooltips();
      setMsg("accionMsg", pausaBano
        ? `Baño iniciado: ${r.inicio || ""}`
        : `Regreso del baño. Minutos: ${r.minutos} · Excedió: ${r.excedio}`
      );
    } else {
      setMsg("accionMsg", r.error || "Error.");
    }
  }

  async function fwToggleFumar() {
    setMsg("accionMsg", pausaFumar ? "Registrando regreso de fumar..." : "Registrando salida a fumar...");
    const r = await api({ action: pausaFumar ? "fumarfin" : "fumarinicio", nombre: operador.nombre });

    if (r.ok) {
      if (!pausaFumar) {
        historialAgregar({ tipo: "fumar", inicio: r.inicio || horaActual_() });
      } else {
        historialActualizarUltimo({ tipo: "fumar", fin: r.regreso || horaActual_(), minutos: r.minutos, excedio: r.excedio });
      }
      pausaFumar = !pausaFumar;
      fwActualizarTooltips();
      setMsg("accionMsg", pausaFumar
        ? `Fumar iniciado: ${r.inicio || ""}`
        : `Regreso de fumar. Minutos: ${r.minutos} · Excedió: ${r.excedio}`
      );
    } else {
      setMsg("accionMsg", r.error || "Error.");
    }
  }

  // Drag
  const gear = document.getElementById("fwGear");
  let dragging = false, dragStartX, dragStartY, widgetStartX, widgetStartY;

  gear.addEventListener("mousedown", e => {
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    const rect = fwWidget.getBoundingClientRect();
    widgetStartX = rect.left;
    widgetStartY = rect.top;
    e.preventDefault();
  });

  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    fwWidget.style.left   = (widgetStartX + dx) + "px";
    fwWidget.style.top    = (widgetStartY + dy) + "px";
    fwWidget.style.right  = "auto";
    fwWidget.style.bottom = "auto";
  });

  document.addEventListener("mouseup", () => { dragging = false; });
</script>
</body>
</html>
